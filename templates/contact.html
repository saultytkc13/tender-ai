{% extends "base.html" %}
{% block title %}Contact — Tender AI{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 py-16">
  <h1 class="text-4xl font-bold text-center mb-4">Contact Us</h1>
  <p class="text-center text-gray-400 mb-8">Have a question? We'd love to hear from you.</p>
  <div class="bg-white rounded-2xl shadow-sm p-8">
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Your Name</label>
      <input type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"/>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"/>
    </div>
    <div class="mb-6">
      <label class="block text-sm font-medium mb-1">Message</label>
      <textarea rows="4" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"></textarea>
    </div>
    <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Send Message</button>
  </div>
</div>
{% endblock %}
