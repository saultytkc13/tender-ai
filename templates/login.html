{% extends "base.html" %}
{% block title %}Login — Tender AI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-md">
    <h1 class="text-2xl font-bold text-center mb-2">Welcome back</h1>
    <p class="text-center text-gray-400 text-sm mb-6">Login to your TenderAI account</p>

    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" required
          class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="you@company.com"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="••••••••"/>
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
        Login
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      Don't have an account? <a href="/register" class="text-indigo-600 font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
